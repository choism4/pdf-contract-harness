<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pdf-contract-writer</title>
<style>
  :root { --bg:#1e1f23; --panel:#26282e; --line:#3a3d45; --txt:#e6e7ea;
          --muted:#9aa0aa; --accent:#e0483d; --accent2:#3d7be0; --ok:#2fbf6b; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:var(--txt); display:flex; height:100vh;
         overflow:hidden; }
  button { background:var(--panel); color:var(--txt); border:1px solid var(--line);
           border-radius:6px; padding:5px 10px; cursor:pointer; }
  button:hover { border-color:var(--accent2); }
  button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  button.on { background:var(--accent2); border-color:var(--accent2); color:#fff; }
  input,select { background:#1b1c20; color:var(--txt); border:1px solid var(--line);
                 border-radius:5px; padding:5px 7px; width:100%; }
  /* 좌측 */
  #sidebar { width:210px; flex:0 0 210px; background:var(--panel);
             border-right:1px solid var(--line); overflow:auto; padding:12px; }
  #sidebar h1 { font-size:12px; color:var(--muted); margin:0 0 10px;
                text-transform:uppercase; letter-spacing:.05em; }
  .proj { padding:8px 10px; border-radius:6px; cursor:pointer; margin-bottom:4px; }
  .proj:hover { background:#2f323a; }
  .proj.active { background:var(--accent); color:#fff; }
  .proj small { display:block; color:var(--muted); font-size:11px; }
  .proj.active small { color:#ffd; }
  /* 중앙 */
  #main { flex:1; overflow:auto; padding:18px; display:flex;
          flex-direction:column; align-items:center; }
  #toolbar { width:100%; display:flex; gap:8px; align-items:center;
             margin-bottom:14px; color:var(--muted); flex-wrap:wrap; }
  #toolbar .title { color:var(--txt); font-weight:600; }
  #stage { position:relative; line-height:0; box-shadow:0 4px 24px #0008;
           background:#fff; user-select:none; touch-action:none; }
  #stage.adding { cursor:crosshair; }
  #stage img { display:block; max-width:100%; height:auto; pointer-events:none; }
  .box { position:absolute; border:2px solid var(--accent);
         background:rgba(224,72,61,.10); cursor:move; }
  .box[data-type="checkbox"] { border-color:var(--accent2); background:rgba(61,123,224,.12); }
  .box[data-type="signature_seal"] { border-color:#c04bd0; background:rgba(192,75,208,.12); }
  .box[data-type="table_cell"] { border-color:#d9a23b; background:rgba(217,162,59,.12); }
  .box[data-status="confirmed"] { box-shadow:0 0 0 2px var(--ok); }
  .box.sel { outline:3px solid #ffd400; outline-offset:1px; z-index:5; }
  .box .tag { position:absolute; left:-2px; top:-18px; font-size:11px; line-height:16px;
         white-space:nowrap; background:var(--accent); color:#fff; padding:0 5px;
         border-radius:3px; pointer-events:none; }
  .box[data-type="checkbox"] .tag { background:var(--accent2); }
  .box[data-type="signature_seal"] .tag { background:#c04bd0; }
  .box[data-type="table_cell"] .tag { background:#d9a23b; }
  .box .h { position:absolute; width:11px; height:11px; background:#fff;
         border:2px solid var(--accent); border-radius:2px; }
  .box .h.br { right:-7px; bottom:-7px; cursor:nwse-resize; }
  .box .h.tl { left:-7px; top:-7px; cursor:nwse-resize; }
  /* 우측 */
  #right { width:300px; flex:0 0 300px; background:var(--panel);
           border-left:1px solid var(--line); overflow:auto; padding:12px; }
  #right h2 { font-size:12px; color:var(--muted); margin:14px 0 8px;
              text-transform:uppercase; letter-spacing:.05em; }
  #right h2:first-child { margin-top:0; }
  .frow { padding:7px 9px; border:1px solid var(--line); border-radius:6px;
          margin-bottom:6px; cursor:pointer; }
  .frow:hover, .frow.hi { border-color:var(--accent); background:#2f323a; }
  .frow.sel { border-color:#ffd400; }
  .frow .lbl { font-weight:600; }
  .frow .meta { color:var(--muted); font-size:11px; }
  .empty { color:var(--muted); padding:16px; text-align:center; font-size:13px; }
  .ed label { display:block; font-size:11px; color:var(--muted); margin:9px 0 3px; }
  .ed .rowbtn { display:flex; gap:8px; margin-top:12px; }
  #status { position:fixed; bottom:8px; right:12px; font-size:11px; color:var(--muted); }
  .dirty { color:#ffd400; }
</style>
</head>
<body>
  <aside id="sidebar"><h1>Projects</h1><div id="projlist"></div></aside>

  <main id="main">
    <div id="toolbar">
      <span class="title" id="ttitle">프로젝트를 선택하세요</span>
      <span id="pageinfo"></span>
      <span style="flex:1"></span>
      <button id="addbtn">+ 필드 추가</button>
      <button id="prev">◀</button>
      <button id="next">▶</button>
      <button id="save" class="primary">저장</button>
    </div>
    <div id="stage"><img id="pageimg" alt=""></div>
  </main>

  <aside id="right"><div id="rightbody"><div class="empty">—</div></div></aside>
  <div id="status"></div>

<script>
const S = { subject:null, page:0, doc:null, mtime:0, poll:null,
            sel:null, dirty:false, mode:"select" };
const TYPES = ["underline","underscore_blank","checkbox","table_cell","signature_seal"];

async function j(url, opts){ const r = await fetch(url, opts);
  if(!r.ok) throw new Error(url+" "+r.status); return r.json(); }
const enc = encodeURIComponent;
function setDirty(v){ S.dirty=v;
  document.getElementById("save").classList.toggle("dirty",v);
  document.getElementById("save").textContent = v ? "저장 *" : "저장"; }

// ── 프로젝트 ──────────────────────────────────────────
async function loadProjects(){
  const {projects} = await j("/api/projects");
  const el = document.getElementById("projlist"); el.innerHTML="";
  if(!projects.length){ el.innerHTML='<div class="empty">projects/ 비어있음</div>'; return; }
  for(const p of projects){
    const d = document.createElement("div");
    d.className="proj"+(p.subject===S.subject?" active":"");
    d.innerHTML=`${p.subject}<small>${p.has_fields?"fields ✓":"미추출"}${p.has_export?" · export ✓":""}</small>`;
    d.onclick=()=>selectProject(p.subject);
    el.appendChild(d);
  }
}
async function selectProject(subject){
  if(S.dirty && !confirm("저장 안 된 변경이 있음. 버리고 이동?")) return;
  S.subject=subject; S.page=0; S.sel=null; setDirty(false);
  await loadProjects(); await loadDoc(); startPolling();
}
async function loadDoc(){
  try { S.doc = await j(`/api/project/${enc(S.subject)}`);
        S.mtime = (await j(`/api/project/${enc(S.subject)}/version`)).mtime; }
  catch(e){ document.getElementById("ttitle").textContent =
    S.subject+" — fields.json 없음 (추출 스킬 먼저)"; S.doc=null; }
  render();
}
function pageFields(){ return (S.doc?.fields||[]).filter(f=>f.page===S.page); }
function pageMeta(){ return (S.doc?.pages||[])[S.page]; }
function field(id){ return S.doc.fields.find(f=>f.id===id); }

// ── 렌더 ─────────────────────────────────────────────
function render(){
  if(!S.doc){ document.getElementById("pageimg").src="";
    document.getElementById("rightbody").innerHTML='<div class="empty">—</div>'; return; }
  document.getElementById("ttitle").textContent=S.doc.subject;
  document.getElementById("pageinfo").textContent=`· page ${S.page+1}/${S.doc.page_count}`;
  document.getElementById("pageimg").src=`/api/project/${enc(S.subject)}/page/${S.page}?v=${S.mtime}`;
  drawBoxes(); drawRight();
}
function drawBoxes(){
  const stage=document.getElementById("stage");
  stage.querySelectorAll(".box").forEach(b=>b.remove());
  for(const f of pageFields()){
    const [x0,y0,x1,y1]=f.bbox_norm;
    const b=document.createElement("div");
    b.className="box"+(f.id===S.sel?" sel":"");
    b.dataset.type=f.type; b.dataset.status=f.status; b.dataset.id=f.id;
    b.style.left=(x0*100)+"%"; b.style.top=(y0*100)+"%";
    b.style.width=((x1-x0)*100)+"%"; b.style.height=((y1-y0)*100)+"%";
    const tag=document.createElement("span"); tag.className="tag";
    tag.textContent=f.label||f.type; b.appendChild(tag);
    if(f.id===S.sel){ for(const h of ["tl","br"]){
      const hd=document.createElement("div"); hd.className="h "+h;
      hd.dataset.h=h; b.appendChild(hd); } }
    b.onmousedown=(e)=>startDragResize(e,f);
    stage.appendChild(b);
  }
}
function drawRight(){
  const el=document.getElementById("rightbody");
  if(S.sel){ el.innerHTML=editorHTML(field(S.sel)); bindEditor(); return; }
  const fs=pageFields();
  let h=`<h2>Fields (${fs.length})</h2>`;
  if(!fs.length) h+='<div class="empty">이 페이지 필드 없음. "+ 필드 추가"로 그리기.</div>';
  for(const f of fs){
    h+=`<div class="frow" data-id="${f.id}"><div class="lbl">${f.label||"<i>라벨 없음</i>"}</div>
        <div class="meta">${f.type} · ${f.source} · ${f.status}${f.fill_hint?(" · "+esc(f.fill_hint)):""}</div></div>`;
  }
  el.innerHTML=h;
  el.querySelectorAll(".frow").forEach(d=>{
    d.onclick=()=>{ S.sel=d.dataset.id; render(); };
    d.onmouseenter=()=>hi(d.dataset.id,true); d.onmouseleave=()=>hi(d.dataset.id,false);
  });
}
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function hi(id,on){ document.querySelectorAll(`.box[data-id="${id}"]`).forEach(e=>e.classList.toggle("hi",on)); }

// ── 에디터 ───────────────────────────────────────────
function editorHTML(f){
  return `<h2>필드 편집 · ${f.id}</h2><div class="ed">
    <label>라벨</label><input id="e_label" value="${esc(f.label)}">
    <label>채울 내용(fill_hint)</label><input id="e_hint" value="${esc(f.fill_hint)}">
    <label>타입</label><select id="e_type">${TYPES.map(t=>`<option ${t===f.type?"selected":""}>${t}</option>`).join("")}</select>
    <label>상태</label><select id="e_status">
      <option ${f.status==="draft"?"selected":""}>draft</option>
      <option ${f.status==="confirmed"?"selected":""}>confirmed</option></select>
    <label>좌표 (bbox_pt, 읽기전용)</label>
    <input value="${f.bbox_pt.map(n=>n.toFixed(1)).join(", ")}" readonly>
    <div class="rowbtn">
      <button id="e_close">← 목록</button>
      <button id="e_del" style="border-color:var(--accent);color:var(--accent)">삭제</button>
    </div>
    <div class="meta" style="margin-top:8px;color:var(--muted);font-size:11px">
      source: ${f.source} · 박스를 드래그/모서리로 이동·리사이즈</div></div>`;
}
function bindEditor(){
  const f=field(S.sel);
  const upd=(k,v)=>{ f[k]=v; if(k!=="status") f.source="manual"; setDirty(true); drawBoxes(); };
  document.getElementById("e_label").oninput=e=>{ f.label=e.target.value; setDirty(true); drawBoxes(); };
  document.getElementById("e_hint").oninput=e=>{ f.fill_hint=e.target.value; setDirty(true); };
  document.getElementById("e_type").onchange=e=>{ f.type=e.target.value; setDirty(true); drawBoxes(); };
  document.getElementById("e_status").onchange=e=>{ f.status=e.target.value; setDirty(true); drawBoxes(); };
  document.getElementById("e_close").onclick=()=>{ S.sel=null; render(); };
  document.getElementById("e_del").onclick=()=>{
    S.doc.fields=S.doc.fields.filter(x=>x.id!==S.sel); S.sel=null; setDirty(true); render(); };
}

// ── 드래그 / 리사이즈 ─────────────────────────────────
function imgRect(){ return document.getElementById("pageimg").getBoundingClientRect(); }
function startDragResize(e,f){
  e.preventDefault(); e.stopPropagation();
  S.sel=f.id; drawRight();
  const handle=e.target.dataset.h;            // tl|br|undefined(이동)
  const r=imgRect(); const start=f.bbox_norm.slice();
  const sx=e.clientX, sy=e.clientY;
  function mv(ev){
    const dx=(ev.clientX-sx)/r.width, dy=(ev.clientY-sy)/r.height;
    let [x0,y0,x1,y1]=start;
    if(!handle){ x0+=dx;x1+=dx;y0+=dy;y1+=dy; }
    else if(handle==="br"){ x1+=dx;y1+=dy; }
    else if(handle==="tl"){ x0+=dx;y0+=dy; }
    // clamp 0..1, 최소 크기
    x0=Math.max(0,Math.min(x0,0.999)); y0=Math.max(0,Math.min(y0,0.999));
    x1=Math.max(x0+0.005,Math.min(x1,1)); y1=Math.max(y0+0.003,Math.min(y1,1));
    f.bbox_norm=[r4(x0),r4(y0),r4(x1),r4(y1)]; recomputePt(f);
    setDirty(true); drawBoxes();
  }
  function up(){ document.removeEventListener("mousemove",mv);
    document.removeEventListener("mouseup",up); f.source="manual"; drawRight(); }
  document.addEventListener("mousemove",mv); document.addEventListener("mouseup",up);
}
function r4(n){ return Math.round(n*1e4)/1e4; }
function recomputePt(f){
  const m=pageMeta(); if(!m) return;
  const [w,h]=m.size_pt; const [x0,y0,x1,y1]=f.bbox_norm;
  f.bbox_pt=[r2(x0*w),r2(y0*h),r2(x1*w),r2(y1*h)];
}
function r2(n){ return Math.round(n*100)/100; }

// ── 추가 모드 ────────────────────────────────────────
document.getElementById("addbtn").onclick=()=>{
  if(!S.doc) return;
  S.mode = S.mode==="add"?"select":"add";
  document.getElementById("addbtn").classList.toggle("on",S.mode==="add");
  document.getElementById("stage").classList.toggle("adding",S.mode==="add");
};
document.getElementById("stage").addEventListener("mousedown",function(e){
  if(S.mode!=="add"||e.target.classList.contains("box")||e.target.classList.contains("h")) return;
  e.preventDefault();
  const r=imgRect(); const sx=(e.clientX-r.left)/r.width, sy=(e.clientY-r.top)/r.height;
  const nid="f"+(1+Math.max(0,...S.doc.fields.map(f=>parseInt(f.id.slice(1))||0)));
  const f={ id:nid, page:S.page, type:"underline", label:"", fill_hint:"",
            context:"", value:null, bbox_norm:[r4(sx),r4(sy),r4(sx+0.01),r4(sy+0.01)],
            bbox_pt:[0,0,0,0], source:"manual", confidence:1.0, status:"draft" };
  recomputePt(f); S.doc.fields.push(f); S.sel=nid; setDirty(true);
  // 곧바로 리사이즈 드래그
  startDragResize({clientX:e.clientX,clientY:e.clientY,preventDefault(){},stopPropagation(){},
                   target:{dataset:{h:"br"}}}, f);
  drawBoxes(); drawRight();
  // 추가 1회 후 select 모드 복귀
  S.mode="select"; document.getElementById("addbtn").classList.remove("on");
  document.getElementById("stage").classList.remove("adding");
});

// 빈 곳 클릭 → 선택 해제
document.getElementById("stage").addEventListener("click",function(e){
  if(e.target.id==="stage"||e.target.id==="pageimg"){ if(S.sel){S.sel=null;render();} }
});

// ── 저장 ─────────────────────────────────────────────
document.getElementById("save").onclick=async()=>{
  if(!S.doc) return;
  S.doc.fields.forEach(recomputePt);
  const res=await j(`/api/project/${enc(S.subject)}/fields`,{
    method:"PUT", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({data:S.doc})});
  S.mtime=res.mtime; setDirty(false);
  document.getElementById("status").textContent="✓ 저장 "+new Date().toLocaleTimeString();
};

// 네비
document.getElementById("prev").onclick=()=>{ if(S.doc&&S.page>0){S.page--;S.sel=null;render();} };
document.getElementById("next").onclick=()=>{ if(S.doc&&S.page<S.doc.page_count-1){S.page++;S.sel=null;render();} };
// 키보드: Delete=삭제, Esc=선택해제
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT") return;
  if(e.key==="Escape"&&S.sel){ S.sel=null; render(); }
  if((e.key==="Delete"||e.key==="Backspace")&&S.sel){
    S.doc.fields=S.doc.fields.filter(x=>x.id!==S.sel); S.sel=null; setDirty(true); render(); }
});

// ── live-reload: 편집 중(dirty)엔 멈춤 → Claude 동시수정 충돌 방지 ──
function startPolling(){
  if(S.poll) clearInterval(S.poll);
  S.poll=setInterval(async()=>{
    if(!S.subject||S.dirty) return;
    try{ const {mtime}=await j(`/api/project/${enc(S.subject)}/version`);
      if(mtime&&mtime!==S.mtime){ S.mtime=mtime; await loadDoc();
        document.getElementById("status").textContent="↻ reloaded "+new Date().toLocaleTimeString(); }
    }catch(e){}
  },1500);
}
window.addEventListener("beforeunload",e=>{ if(S.dirty){e.preventDefault();e.returnValue="";} });

loadProjects();
</script>
</body>
</html>

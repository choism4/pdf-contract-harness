<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pdf-contract-writer</title>
<style>
  /* Apple-style light theme — SF Pro, single Action-Blue accent, hairlines, minimal shadow */
  :root {
    --canvas:#f5f5f7; --panel:#ffffff; --pearl:#fafafc;
    --line:#e0e0e0; --line-soft:#f0f0f0;
    --ink:#1d1d1f; --muted:#7a7a7a; --muted2:#86868b;
    --accent:#0066cc; --accent-focus:#0071e3;
    --ok:#34c759; --warn:#ff9f0a; --danger:#ff3b30;
    --field:#0066cc;          /* text field */
    --field-cb:#34c759;       /* checkbox */
    --field-sig:#af52de;      /* signature */
  }
  * { box-sizing:border-box; }
  body { margin:0;
         font:15px/1.47 system-ui,-apple-system,"SF Pro Text",BlinkMacSystemFont,sans-serif;
         letter-spacing:-0.01em;
         background:var(--canvas); color:var(--ink); display:flex; height:100vh;
         overflow:hidden; -webkit-font-smoothing:antialiased;
         user-select:none; -webkit-user-select:none; }
  input,select,textarea,[contenteditable] { user-select:text; -webkit-user-select:text; }
  button { background:var(--panel); color:var(--ink); border:1px solid var(--line);
           border-radius:8px; padding:7px 14px; cursor:pointer; font:inherit;
           font-size:13px; letter-spacing:-0.01em;
           transition:background .15s ease, border-color .15s ease, transform .08s ease; }
  button:hover { background:var(--pearl); border-color:#d0d0d2; }
  button:active { transform:scale(0.96); }
  button.primary { background:var(--accent); border-color:var(--accent); color:#fff;
                   border-radius:980px; padding:7px 17px; font-weight:500; }
  button.primary:hover { background:var(--accent-focus); border-color:var(--accent-focus); }
  button.ghost-pill { background:var(--panel); color:var(--accent);
                      border-color:var(--accent); border-radius:980px; padding:7px 17px; }
  button.ghost-pill:hover { background:rgba(0,102,204,.06); }
  button.on { background:var(--accent); border-color:var(--accent); color:#fff; }
  button.on:hover { background:var(--accent-focus); }
  input,select { background:var(--panel); color:var(--ink); border:1px solid var(--line);
                 border-radius:8px; padding:8px 10px; width:100%; font:inherit;
                 font-size:14px; transition:border-color .15s ease, box-shadow .15s ease; }
  input:focus,select:focus { outline:none; border-color:var(--accent-focus);
                 box-shadow:0 0 0 3px rgba(0,113,227,.18); }
  /* left */
  #sidebar { width:230px; flex:0 0 230px; background:var(--panel);
             border-right:1px solid var(--line); overflow:auto; padding:16px 12px; }
  #sidebar h1 { font-size:11px; color:var(--muted); margin:0 0 10px 6px; font-weight:600;
                text-transform:uppercase; letter-spacing:.04em; }
  #projsearch { margin-bottom:10px; font-size:13px; padding:7px 10px; }
  .proj { padding:9px 11px; border-radius:10px; cursor:pointer; margin-bottom:3px;
          transition:background .15s ease; }
  .proj:hover { background:var(--canvas); }
  .proj.active { background:var(--accent); color:#fff; }
  .proj .pname { font-weight:500; font-size:13px; overflow:hidden;
                 text-overflow:ellipsis; white-space:nowrap; }
  .proj small { display:flex; align-items:center; gap:6px; color:var(--muted);
                font-size:11px; margin-top:3px; }
  .proj.active small { color:rgba(255,255,255,.8); }
  .pill { font-size:10px; padding:1px 7px; border-radius:980px; font-weight:600;
          text-transform:capitalize; }
  .pill.draft { background:#fff3e0; color:#b9762a; }
  .pill.confirmed { background:#e3f9ea; color:#1c7d3f; }
  .proj.active .pill { background:rgba(255,255,255,.22); color:#fff; }
  /* center */
  #main { flex:1; overflow:hidden; display:flex; flex-direction:column; }
  #toolbar { flex:0 0 auto; z-index:50; display:flex; gap:7px;
             align-items:center; color:var(--muted); flex-wrap:wrap;
             background:rgba(245,245,247,.8); backdrop-filter:saturate(180%) blur(20px);
             -webkit-backdrop-filter:saturate(180%) blur(20px); padding:11px 18px;
             border-bottom:1px solid var(--line); }
  #scroll { flex:1; overflow:auto; padding:24px; display:flex;
            flex-direction:column; align-items:stretch; }
  #toolbar .title { color:var(--ink); font-weight:600; font-size:15px; letter-spacing:-0.02em;
            max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #toolbar #pageinfo { font-size:13px; }
  #stage { position:relative; line-height:0;
           box-shadow:rgba(0,0,0,0.22) 0 5px 30px 0;
           background:#fff; user-select:none; touch-action:none; margin:0 auto; }
  #stage.adding { cursor:crosshair; }
  #stage img { display:block; width:100%; height:auto; pointer-events:none; }
  .box { position:absolute; border:1.5px solid var(--field);
         background:rgba(0,102,204,.08); border-radius:2px; cursor:move; }
  .box[data-type="checkbox"] { border-color:var(--field-cb); background:rgba(52,199,89,.12); }
  .box[data-type="signature"] { border-color:var(--field-sig); background:rgba(175,82,222,.12); }
  .box.sel { outline:2.5px solid var(--warn); outline-offset:1px; z-index:5;
             box-shadow:0 0 0 4px rgba(255,159,10,.22); }
  .box .tag { position:absolute; left:-1.5px; top:-19px; font-size:11px; line-height:17px;
         white-space:nowrap; background:var(--field); color:#fff; padding:0 6px;
         border-radius:5px; font-weight:500; letter-spacing:-0.01em;
         pointer-events:auto; cursor:text; max-width:240px; overflow:hidden;
         text-overflow:ellipsis; }
  .box .tag:hover { filter:brightness(1.12); }
  .box[data-type="checkbox"] .tag { background:var(--field-cb); }
  .box[data-type="signature"] .tag { background:var(--field-sig); }
  .box .taginput { position:absolute; left:-1.5px; top:-21px; height:19px; font-size:11px;
         line-height:19px; padding:0 6px; border-radius:5px; border:1.5px solid var(--accent);
         background:#fff; color:var(--ink); width:160px; z-index:6; box-shadow:0 1px 4px rgba(0,0,0,.2); }
  .box .ghost { position:absolute; left:3px; right:2px; bottom:1px; line-height:1;
         color:rgba(0,102,204,.85); white-space:nowrap; overflow:hidden;
         pointer-events:none; font-family:system-ui,-apple-system,sans-serif; }
  .box .h { position:absolute; width:11px; height:11px; background:#fff;
         border:2px solid var(--accent-focus); border-radius:50%;
         box-shadow:0 1px 3px rgba(0,0,0,.2); }
  .box .h.br { right:-7px; bottom:-7px; cursor:nwse-resize; }
  .box .h.tl { left:-7px; top:-7px; cursor:nwse-resize; }
  .box .h.tr { right:-7px; top:-7px; cursor:nesw-resize; }
  .box .h.bl { left:-7px; bottom:-7px; cursor:nesw-resize; }
  /* right = properties dock */
  #right { width:340px; flex:0 0 340px; background:var(--panel);
           border-left:1px solid var(--line); overflow:auto; }
  .panel { border-bottom:1px solid var(--line-soft); }
  .ptitle { font-size:11px; color:var(--muted); text-transform:uppercase;
            letter-spacing:.05em; font-weight:600; padding:11px 16px;
            background:rgba(255,255,255,.85); backdrop-filter:saturate(180%) blur(12px);
            -webkit-backdrop-filter:saturate(180%) blur(12px);
            border-bottom:1px solid var(--line-soft); display:flex; align-items:center;
            gap:6px; }
  .ptitle .sp { flex:1; }
  .ptitle .chip { font-size:11px; color:var(--muted); background:var(--canvas);
                  padding:2px 9px; border-radius:980px; font-weight:500;
                  letter-spacing:0; text-transform:none; }
  .pbody { padding:14px 16px; }
  /* property row: key (left) + control (right) */
  .prow { display:flex; align-items:center; gap:10px; margin-bottom:11px; }
  .prow.col { flex-direction:column; align-items:stretch; gap:6px; }
  .prow > .k { flex:0 0 62px; font-size:12px; color:var(--muted); }
  .prow.col > .k { flex:none; }
  .prow > .v { flex:1; min-width:0; }
  .prow .v input, .prow .v select { width:100%; }
  .prow.num .v { flex:0 0 104px; display:flex; align-items:center; gap:6px; }
  .prow.num .v input { width:62px; text-align:right; }
  .prow.num .unit { font-size:12px; color:var(--muted); }
  /* type selector: icon + text segmented */
  .tseg { display:flex; gap:6px; }
  .tseg button { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
                 border:1px solid var(--line); border-radius:10px; background:var(--panel);
                 padding:9px 4px; font-size:11px; color:var(--muted); font-weight:500; }
  .tseg button .ic { font-size:17px; line-height:1; }
  .tseg button.on { border-color:var(--accent); color:var(--accent);
                    background:rgba(0,102,204,.06); }
  /* coordinate grid X / Y / W / H */
  .coord { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
  .coord .c { display:flex; align-items:center; gap:6px; }
  .coord .c label { font-size:11px; color:var(--muted); width:13px; font-weight:600; }
  .coord .c input { font-size:12px; padding:6px 8px; }
  /* status segmented toggle */
  .seg { display:flex; background:var(--canvas); border-radius:9px; padding:2px; gap:2px; }
  .seg button { flex:1; border:0; border-radius:7px; background:transparent;
                color:var(--muted); padding:7px 0; font-size:12px; font-weight:500; }
  .seg button:hover { background:transparent; }
  .seg button.on { background:var(--ok); color:#fff; font-weight:600; }
  .seg button.on.drafton { background:var(--warn); color:#fff; }
  .prowbtn { display:flex; gap:8px; margin-top:14px; }
  .prowbtn button { flex:1; }
  /* field list */
  .ftools { display:flex; align-items:center; gap:8px; margin-bottom:11px; }
  .ftools #fsearch { font-size:13px; padding:6px 9px; }
  .chk { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted);
         white-space:nowrap; cursor:pointer; user-select:none; }
  .chk input { width:auto; box-shadow:none; }
  .frow { padding:10px 11px; border:1px solid var(--line); border-radius:10px;
          margin-bottom:7px; cursor:pointer; display:flex; align-items:center; gap:9px;
          transition:background .12s ease, border-color .12s ease; }
  .frow:hover, .frow.hi { border-color:var(--accent); background:rgba(0,102,204,.04); }
  .frow.sel { border-color:var(--warn); box-shadow:0 0 0 3px rgba(255,159,10,.16); }
  .frow .dot { width:8px; height:8px; border-radius:50%; flex:0 0 8px; background:var(--field); }
  .frow[data-type="checkbox"] .dot { background:var(--field-cb); }
  .frow[data-type="signature"] .dot { background:var(--field-sig); }
  .frow .lbl { font-weight:600; flex:1; min-width:0; overflow:hidden; letter-spacing:-0.01em;
               text-overflow:ellipsis; white-space:nowrap; }
  .frow .lbl i { color:var(--muted); font-weight:400; }
  .frow .ty { font-size:11px; color:var(--muted); }
  .empty { color:var(--muted); padding:20px 16px; text-align:center; font-size:13px;
           line-height:1.5; }
  #status { position:fixed; bottom:10px; right:14px; font-size:12px; color:var(--muted);
            background:rgba(255,255,255,.8); backdrop-filter:blur(8px);
            -webkit-backdrop-filter:blur(8px); padding:4px 10px; border-radius:980px; }
  .dirty { color:var(--warn); }
</style>
</head>
<body>
  <aside id="sidebar">
    <h1>Projects</h1>
    <input id="projsearch" placeholder="Search projects…" autocomplete="off">
    <div id="projlist"></div>
  </aside>

  <main id="main">
    <div id="toolbar">
      <span class="title" id="ttitle">Select a project</span>
      <span id="pageinfo"></span>
      <button id="zoomout" title="Zoom out">−</button>
      <button id="zoomlbl" title="Reset to fit">100%</button>
      <button id="zoomin" title="Zoom in">+</button>
      <span style="flex:1"></span>
      <button id="addbtn">+ Add field</button>
      <button id="prev" title="Previous page">◀</button>
      <button id="next" title="Next page">▶</button>
      <button id="save" class="primary">Save</button>
      <button id="export" class="ghost-pill">Export</button>
    </div>
    <div id="scroll"><div id="stage"><img id="pageimg" alt=""></div></div>
  </main>

  <aside id="right"><div id="rightbody"><div class="empty">—</div></div></aside>
  <div id="status"></div>

<script>
const S = { subject:null, page:0, doc:null, mtime:0, poll:null,
            sel:null, dirty:false, mode:"select", zoom:1, anim:0 };
// 3 field types only
const TYPES = [
  { v:"text",      label:"Text",      ic:"T" },
  { v:"checkbox",  label:"Checkbox",  ic:"☑" },
  { v:"signature", label:"Signature", ic:"✍" },
];
const typeLabel = v => (TYPES.find(t=>t.v===v)||{label:v}).label;

async function j(url, opts){ const r = await fetch(url, opts);
  if(!r.ok) throw new Error(url+" "+r.status); return r.json(); }
const enc = encodeURIComponent;
function setDirty(v){ S.dirty=v;
  document.getElementById("save").classList.toggle("dirty",v);
  document.getElementById("save").textContent = v ? "Save *" : "Save"; }

// ── projects ─────────────────────────────────────────
async function loadProjects(){
  const {projects} = await j("/api/projects");
  S._projects = projects;
  renderProjects();
}
function renderProjects(){
  const q=(S.projQuery||"").toLowerCase();
  const list=(S._projects||[]).filter(p=>p.subject.toLowerCase().includes(q));
  const el=document.getElementById("projlist"); el.innerHTML="";
  if(!list.length){ el.innerHTML='<div class="empty">No matching projects</div>'; return; }
  for(const p of list){
    const d=document.createElement("div");
    d.className="proj"+(p.subject===S.subject?" active":"");
    const pill=p.has_fields?`<span class="pill ${p.status||'draft'}">${p.status||'draft'}</span>`:'';
    const meta=p.has_fields?`${p.field_count} fields${p.has_export?' · export ✓':''}`:'not extracted';
    d.innerHTML=`<div class="pname">${esc(p.subject)}</div><small>${pill}<span>${meta}</span></small>`;
    d.onclick=()=>selectProject(p.subject);
    el.appendChild(d);
  }
}
document.getElementById("projsearch").addEventListener("input",e=>{
  S.projQuery=e.target.value; renderProjects();
});
async function selectProject(subject){
  if(S.dirty && !confirm("You have unsaved changes. Discard and switch?")) return;
  S.subject=subject; S.page=0; S.sel=null; setDirty(false);
  await loadProjects(); await loadDoc(); startPolling();
}
async function loadDoc(){
  try { S.doc = await j(`/api/project/${enc(S.subject)}`);
        S.mtime = (await j(`/api/project/${enc(S.subject)}/version`)).mtime; }
  catch(e){ document.getElementById("ttitle").textContent =
    S.subject+" — no fields.json (run the extract skill first)"; S.doc=null; }
  render();
}
function pageFields(){ return (S.doc?.fields||[]).filter(f=>f.page===S.page); }
function pageMeta(){ return (S.doc?.pages||[])[S.page]; }
function field(id){ return S.doc.fields.find(f=>f.id===id); }

// ── render ───────────────────────────────────────────
function render(){
  if(!S.doc){ document.getElementById("pageimg").src="";
    document.getElementById("rightbody").innerHTML='<div class="empty">—</div>'; return; }
  document.getElementById("ttitle").textContent=S.doc.subject;
  document.getElementById("pageinfo").textContent=`· page ${S.page+1}/${S.doc.page_count}`;
  document.getElementById("pageimg").src=`/api/project/${enc(S.subject)}/page/${S.page}?v=${S.mtime}`;
  drawBoxes(); drawRight(); applyZoom();
}

// ── zoom ─────────────────────────────────────────────
function applyZoom(){
  const main=document.getElementById("scroll");
  const fitW=Math.max(200, main.clientWidth - 48);   // minus padding (24*2)
  document.getElementById("stage").style.width=(fitW*S.zoom)+"px";
  document.getElementById("zoomlbl").textContent=Math.round(S.zoom*100)+"%";
  updateGhostSizes();
}
function setZoom(z, cx, cy){
  cancelAnimationFrame(S.anim);
  const main=document.getElementById("scroll");
  const old=S.zoom;
  S.zoom=Math.max(0.25,Math.min(6,z));
  if(cx!=null){
    const r=main.getBoundingClientRect();
    const px=main.scrollLeft+(cx-r.left), py=main.scrollTop+(cy-r.top);
    const k=S.zoom/old;
    applyZoom();
    main.scrollLeft=px*k-(cx-r.left); main.scrollTop=py*k-(cy-r.top);
  } else applyZoom();
}
// animated zoom to a field (clicking it in the list)
function centerOn(cx,cy){
  const main=document.getElementById("scroll"), stage=document.getElementById("stage");
  const sr=stage.getBoundingClientRect(), mr=main.getBoundingClientRect();
  main.scrollLeft += (sr.left+cx*sr.width)  - (mr.left+mr.width/2);
  main.scrollTop  += (sr.top +cy*sr.height) - (mr.top +mr.height/2);
}
function focusField(id){
  const f=field(id); if(!f){ S.sel=id; render(); return; }
  S.sel=id; drawBoxes(); drawRight();
  const main=document.getElementById("scroll");
  const fitW=Math.max(200, main.clientWidth-48);
  const [x0,y0,x1,y1]=f.bbox_norm;
  const cx=(x0+x1)/2, cy=(y0+y1)/2;
  let zt=(main.clientWidth*0.38)/(Math.max(x1-x0,0.001)*fitW);
  zt=Math.max(1.4,Math.min(3,zt));
  const z0=S.zoom, dur=420; let t0=null;
  cancelAnimationFrame(S.anim);
  function step(ts){
    if(t0===null) t0=ts;
    const p=Math.min(1,(ts-t0)/dur);
    const e=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
    S.zoom=z0+(zt-z0)*e; applyZoom(); centerOn(cx,cy);
    if(p<1) S.anim=requestAnimationFrame(step);
  }
  S.anim=requestAnimationFrame(step);
}
document.getElementById("zoomin").onclick=()=>setZoom(S.zoom*1.25);
document.getElementById("zoomout").onclick=()=>setZoom(S.zoom/1.25);
document.getElementById("zoomlbl").onclick=()=>setZoom(1);
document.getElementById("scroll").addEventListener("wheel",e=>{
  if(!e.ctrlKey&&!e.metaKey) return;        // Ctrl/Cmd+wheel or trackpad pinch = zoom
  e.preventDefault();
  const d=Math.max(-60,Math.min(60,e.deltaY));
  setZoom(S.zoom*Math.exp(-d*0.0125), e.clientX, e.clientY);
},{passive:false});
window.addEventListener("resize",()=>{ if(S.zoom===1) applyZoom(); });

// ── middle-button drag = pan ─────────────────────────
(function(){
  const main=document.getElementById("scroll");
  let panning=false, sx=0, sy=0, sl=0, st=0;
  main.addEventListener("mousedown",e=>{
    if(e.button!==1) return;
    e.preventDefault(); panning=true;
    sx=e.clientX; sy=e.clientY; sl=main.scrollLeft; st=main.scrollTop;
    main.style.cursor="grabbing";
  });
  window.addEventListener("mousemove",e=>{
    if(!panning) return;
    main.scrollLeft=sl-(e.clientX-sx); main.scrollTop=st-(e.clientY-sy);
  });
  window.addEventListener("mouseup",e=>{
    if(e.button===1&&panning){ panning=false; main.style.cursor=""; }
  });
  main.addEventListener("auxclick",e=>{ if(e.button===1) e.preventDefault(); });
})();

function drawBoxes(){
  const stage=document.getElementById("stage");
  stage.querySelectorAll(".box").forEach(b=>b.remove());
  for(const f of pageFields()){
    const [x0,y0,x1,y1]=f.bbox_norm;
    const b=document.createElement("div");
    b.className="box"+(f.id===S.sel?" sel":"");
    b.dataset.type=f.type; b.dataset.id=f.id;
    b.style.left=(x0*100)+"%"; b.style.top=(y0*100)+"%";
    b.style.width=((x1-x0)*100)+"%"; b.style.height=((y1-y0)*100)+"%";
    const tag=document.createElement("span"); tag.className="tag";
    tag.textContent=f.label||typeLabel(f.type); tag.title="Click to rename";
    tag.onmousedown=(ev)=>ev.stopPropagation();
    tag.onclick=(ev)=>{ ev.stopPropagation(); startTagEdit(f,b); };
    b.appendChild(tag);
    if(f.example){ const gh=document.createElement("span"); gh.className="ghost";
      gh.textContent=f.example; gh.dataset.fs=f.font_size||10; b.appendChild(gh); }
    if(f.id===S.sel){ for(const h of ["tl","tr","bl","br"]){
      const hd=document.createElement("div"); hd.className="h "+h;
      hd.dataset.h=h; b.appendChild(hd); } }
    b.onmousedown=(e)=>startDragResize(e,f);
    stage.appendChild(b);
  }
  updateGhostSizes();
}
// ghost example: convert font_size(pt) to px at current render scale
function updateGhostSizes(){
  const m=pageMeta(); if(!m) return;
  const stageW=document.getElementById("stage").clientWidth || 1;
  const pxPerPt=stageW/m.size_pt[0];
  document.querySelectorAll("#stage .ghost").forEach(g=>{
    g.style.fontSize=(parseFloat(g.dataset.fs)*pxPerPt)+"px";
  });
}

// ── right dock ───────────────────────────────────────
function docPanelHTML(){
  const st=S.doc.status||"draft";
  return `<div class="panel"><div class="ptitle"><span>Document</span><span class="sp"></span>
    <span class="chip">${S.doc.page_count}p · ${S.doc.fields.length} fields</span></div>
    <div class="pbody"><div class="prow"><span class="k">Status</span><span class="v"><div class="seg">
      <button id="d_draft" class="${st==="draft"?"on drafton":""}">Draft</button>
      <button id="d_conf" class="${st==="confirmed"?"on":""}">Confirmed</button>
    </div></span></div></div></div>`;
}
function fieldsListHTML(){
  const fs=pageFields();
  let h=`<div class="panel"><div class="ptitle"><span>Fields · page ${S.page+1}</span>
        <span class="sp"></span><span class="chip">${fs.length}</span></div><div class="pbody">
        <div class="ftools">
          <input id="fsearch" placeholder="Filter by label…" autocomplete="off" value="${esc(S.fieldQuery||"")}">
          <label class="chk"><input type="checkbox" id="fhide" ${S.hideUnlabeled?"checked":""}>Labeled only</label>
        </div>`;
  if(!fs.length) h+='<div class="empty">No fields on this page.<br>Use "+ Add field" to draw one.</div>';
  for(const f of fs){
    h+=`<div class="frow" data-id="${f.id}" data-type="${f.type}">
        <span class="dot"></span>
        <span class="lbl">${f.label?esc(f.label):"<i>No label</i>"}</span>
        <span class="ty">${typeLabel(f.type)}</span></div>`;
  }
  return h+'<div class="empty fnone" style="display:none">No fields match.</div></div></div>';
}
function drawRight(){
  const el=document.getElementById("rightbody");
  if(!S.doc){ el.innerHTML='<div class="empty">—</div>'; return; }
  el.innerHTML = docPanelHTML() + (S.sel ? editorHTML(field(S.sel)) : fieldsListHTML());
  bindDocPanel();
  if(S.sel) bindEditor(); else bindList();
}
function bindDocPanel(){
  const g=id=>document.getElementById(id);
  if(g("d_draft")) g("d_draft").onclick=()=>{ S.doc.status="draft"; setDirty(true); drawRight(); };
  if(g("d_conf"))  g("d_conf").onclick =()=>{ S.doc.status="confirmed"; setDirty(true); drawRight(); };
}
function bindList(){
  const fsearch=document.getElementById("fsearch"), fhide=document.getElementById("fhide");
  const apply=()=>{
    const q=(S.fieldQuery||"").toLowerCase(); let shown=0, total=0;
    document.querySelectorAll("#right .frow").forEach(d=>{
      total++; const f=field(d.dataset.id); const lbl=(f.label||"").toLowerCase();
      const ok=(!q||lbl.includes(q))&&(!S.hideUnlabeled||!!f.label);
      d.style.display=ok?"":"none"; if(ok) shown++;
    });
    const chip=document.querySelector("#right .ptitle .chip");
    if(chip) chip.textContent= (shown===total)? total : shown+"/"+total;
    const none=document.querySelector("#right .fnone"); if(none) none.style.display=shown?"none":"";
  };
  if(fsearch) fsearch.oninput=()=>{ S.fieldQuery=fsearch.value; apply(); };
  if(fhide) fhide.onchange=()=>{ S.hideUnlabeled=fhide.checked; apply(); };
  document.querySelectorAll("#right .frow").forEach(d=>{
    d.onclick=()=>focusField(d.dataset.id);
    d.onmouseenter=()=>hi(d.dataset.id,true); d.onmouseleave=()=>hi(d.dataset.id,false);
  });
  apply();
}
// inline rename from the box tag
function startTagEdit(f, box){
  S.sel=f.id;
  const old=box.querySelector(".tag"); if(old) old.style.visibility="hidden";
  const inp=document.createElement("input"); inp.className="taginput";
  inp.value=f.label||""; inp.placeholder="label";
  box.appendChild(inp); inp.focus(); inp.select();
  let done=false;
  const commit=(save)=>{ if(done) return; done=true;
    if(save){ f.label=inp.value.trim(); setDirty(true); }
    drawBoxes(); drawRight(); };
  inp.onmousedown=(e)=>e.stopPropagation();
  inp.onclick=(e)=>e.stopPropagation();
  inp.onkeydown=(e)=>{ e.stopPropagation();
    if(e.key==="Enter"){ e.preventDefault(); commit(true); }
    else if(e.key==="Escape"){ e.preventDefault(); commit(false); } };
  inp.onblur=()=>commit(true);
}
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function hi(id,on){ document.querySelectorAll(`.box[data-id="${id}"]`).forEach(e=>e.classList.toggle("hi",on)); }

// ── properties panel ─────────────────────────────────
function editorHTML(f){
  const fs = f.font_size!=null ? f.font_size : "";
  const [x0,y0,x1,y1]=f.bbox_pt;
  const co=(v)=>v.toFixed(1);
  return `<div class="panel">
    <div class="ptitle"><span>Properties</span><span class="sp"></span><span class="chip">${f.id}</span></div>
    <div class="pbody">
      <div class="prow"><span class="k">Label</span><span class="v"><input id="e_label" value="${esc(f.label)}" placeholder="e.g. Name"></span></div>
      <div class="prow"><span class="k">Example</span><span class="v"><input id="e_ex" value="${esc(f.example||"")}" placeholder="sample value, e.g. John Doe"></span></div>
      <div class="prow"><span class="k">Hint</span><span class="v"><input id="e_hint" value="${esc(f.fill_hint)}" placeholder="what to fill in"></span></div>
      <div class="prow num"><span class="k">Font</span><span class="v"><input id="e_fs" type="number" step="0.5" min="4" value="${fs}"><span class="unit">pt</span></span></div>
      <div class="prow col"><span class="k">Type</span><div class="v"><div class="tseg">
        ${TYPES.map(t=>`<button data-t="${t.v}" class="${t.v===f.type?"on":""}"><span class="ic">${t.ic}</span>${t.label}</button>`).join("")}
      </div></div></div>
      <div class="prow col"><span class="k">Coordinates <span style="font-weight:400">(pt)</span></span><div class="v"><div class="coord">
        <div class="c"><label>X</label><input value="${co(x0)}" readonly></div>
        <div class="c"><label>Y</label><input value="${co(y0)}" readonly></div>
        <div class="c"><label>W</label><input value="${co(x1-x0)}" readonly></div>
        <div class="c"><label>H</label><input value="${co(y1-y0)}" readonly></div>
      </div></div></div>
      <div class="prowbtn">
        <button id="e_close">← Back</button>
        <button id="e_del" style="border-color:var(--danger);color:var(--danger)">Delete</button>
      </div>
      <div class="empty" style="text-align:left;padding:8px 0 0;font-size:11px">source: ${f.source} · drag the box / corners to move &amp; resize</div>
    </div></div>`;
}
function bindEditor(){
  const f=field(S.sel);
  const g=id=>document.getElementById(id);
  g("e_label").oninput=e=>{ f.label=e.target.value; setDirty(true); drawBoxes(); };
  g("e_ex").oninput=e=>{ f.example=e.target.value; setDirty(true); drawBoxes(); };
  g("e_hint").oninput=e=>{ f.fill_hint=e.target.value; setDirty(true); };
  g("e_fs").oninput=e=>{ f.font_size=e.target.value===""?null:parseFloat(e.target.value); setDirty(true); drawBoxes(); };
  document.querySelectorAll("#right .tseg button").forEach(b=>{
    b.onclick=()=>{ f.type=b.dataset.t; setDirty(true); drawBoxes(); drawRight(); };
  });
  g("e_close").onclick=()=>{ S.sel=null; render(); };
  g("e_del").onclick=()=>{
    S.doc.fields=S.doc.fields.filter(x=>x.id!==S.sel); S.sel=null; setDirty(true); render(); };
}

// ── drag / resize ────────────────────────────────────
function imgRect(){ return document.getElementById("pageimg").getBoundingClientRect(); }
function startDragResize(e,f){
  if(e.button!==undefined && e.button!==0) return;
  e.preventDefault(); e.stopPropagation();
  const handle=e.target.dataset.h;            // tl|br|undefined(move) — read before redraw
  const wasSel=(S.sel===f.id);
  S.sel=f.id;
  if(!wasSel){ drawBoxes(); }                 // 첫 클릭에 바로 핸들 표시(한 번 클릭으로 편집)
  drawRight();
  const r=imgRect(); const start=f.bbox_norm.slice();
  const sx=e.clientX, sy=e.clientY;
  function mv(ev){
    const dx=(ev.clientX-sx)/r.width, dy=(ev.clientY-sy)/r.height;
    let [x0,y0,x1,y1]=start;
    if(!handle){ x0+=dx;x1+=dx;y0+=dy;y1+=dy; }
    else if(handle==="br"){ x1+=dx;y1+=dy; }
    else if(handle==="tl"){ x0+=dx;y0+=dy; }
    else if(handle==="tr"){ x1+=dx;y0+=dy; }
    else if(handle==="bl"){ x0+=dx;y1+=dy; }
    x0=Math.max(0,Math.min(x0,0.999)); y0=Math.max(0,Math.min(y0,0.999));
    x1=Math.max(x0+0.005,Math.min(x1,1)); y1=Math.max(y0+0.003,Math.min(y1,1));
    f.bbox_norm=[r4(x0),r4(y0),r4(x1),r4(y1)]; recomputePt(f);
    setDirty(true); drawBoxes();
  }
  function up(){ document.removeEventListener("mousemove",mv);
    document.removeEventListener("mouseup",up); f.source="manual"; drawRight(); }
  document.addEventListener("mousemove",mv); document.addEventListener("mouseup",up);
}
function r4(n){ return Math.round(n*1e4)/1e4; }
function recomputePt(f){
  const m=pageMeta(); if(!m) return;
  const [w,h]=m.size_pt; const [x0,y0,x1,y1]=f.bbox_norm;
  f.bbox_pt=[r2(x0*w),r2(y0*h),r2(x1*w),r2(y1*h)];
}
function r2(n){ return Math.round(n*100)/100; }

// ── add mode ─────────────────────────────────────────
document.getElementById("addbtn").onclick=()=>{
  if(!S.doc) return;
  S.mode = S.mode==="add"?"select":"add";
  document.getElementById("addbtn").classList.toggle("on",S.mode==="add");
  document.getElementById("stage").classList.toggle("adding",S.mode==="add");
};
document.getElementById("stage").addEventListener("mousedown",function(e){
  if(S.mode!=="add"||e.target.classList.contains("box")||e.target.classList.contains("h")) return;
  e.preventDefault();
  const r=imgRect(); const sx=(e.clientX-r.left)/r.width, sy=(e.clientY-r.top)/r.height;
  const nid="f"+(1+Math.max(0,...S.doc.fields.map(f=>parseInt(f.id.slice(1))||0)));
  const f={ id:nid, page:S.page, type:"text", label:"", fill_hint:"", example:"",
            font_size:10, context:"", value:null,
            bbox_norm:[r4(sx),r4(sy),r4(sx+0.01),r4(sy+0.01)],
            bbox_pt:[0,0,0,0], source:"manual", confidence:1.0 };
  recomputePt(f); S.doc.fields.push(f); S.sel=nid; setDirty(true);
  startDragResize({clientX:e.clientX,clientY:e.clientY,preventDefault(){},stopPropagation(){},
                   target:{dataset:{h:"br"}}}, f);
  drawBoxes(); drawRight();
  S.mode="select"; document.getElementById("addbtn").classList.remove("on");
  document.getElementById("stage").classList.remove("adding");
});

// click empty area → deselect
document.getElementById("stage").addEventListener("click",function(e){
  if(e.target.id==="stage"||e.target.id==="pageimg"){ if(S.sel){S.sel=null;render();} }
});
// clear any stray text selection on non-input mousedown (avoids full-page highlight)
document.addEventListener("mousedown",e=>{
  const t=e.target;
  if(/^(INPUT|SELECT|TEXTAREA)$/.test(t.tagName)||t.isContentEditable) return;
  const s=window.getSelection&&window.getSelection();
  if(s&&s.rangeCount) s.removeAllRanges();
},true);

// ── save ─────────────────────────────────────────────
document.getElementById("save").onclick=async()=>{
  if(!S.doc) return;
  S.doc.fields.forEach(recomputePt);
  const res=await j(`/api/project/${enc(S.subject)}/fields`,{
    method:"PUT", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({data:S.doc})});
  S.mtime=res.mtime; setDirty(false);
  document.getElementById("status").textContent="✓ Saved "+new Date().toLocaleTimeString();
  loadProjects();   // refresh status/count badges in the left list
};

// ── export (all fields → export.json) ────────────────
document.getElementById("export").onclick=async()=>{
  if(!S.doc) return;
  if(S.dirty){ alert("Please save first (you have unsaved changes)."); return; }
  const res=await j(`/api/project/${enc(S.subject)}/export`,{method:"POST"});
  document.getElementById("status").textContent=`✓ export.json (${res.field_count} fields)`;
  loadProjects();
};

// nav
document.getElementById("prev").onclick=()=>{ if(S.doc&&S.page>0){S.page--;S.sel=null;render();} };
document.getElementById("next").onclick=()=>{ if(S.doc&&S.page<S.doc.page_count-1){S.page++;S.sel=null;render();} };
// Cmd/Ctrl+S = save (works even while typing in an input)
document.addEventListener("keydown",e=>{
  if((e.metaKey||e.ctrlKey)&&(e.key==="s"||e.key==="S")){
    e.preventDefault();
    if(S.doc&&S.dirty) document.getElementById("save").click();
  }
});
// keys: Delete=remove, Esc=deselect
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT") return;
  if(e.key==="Escape"&&S.sel){ S.sel=null; render(); }
  if((e.key==="Delete"||e.key==="Backspace")&&S.sel){
    S.doc.fields=S.doc.fields.filter(x=>x.id!==S.sel); S.sel=null; setDirty(true); render(); }
  if(e.key==="ArrowLeft"&&S.doc&&S.page>0){ S.page--;S.sel=null;render(); }
  if(e.key==="ArrowRight"&&S.doc&&S.page<S.doc.page_count-1){ S.page++;S.sel=null;render(); }
});

// ── live-reload: paused while dirty (avoid clobbering Claude Code edits) ──
function startPolling(){
  if(S.poll) clearInterval(S.poll);
  S.poll=setInterval(async()=>{
    if(!S.subject||S.dirty) return;
    try{ const {mtime}=await j(`/api/project/${enc(S.subject)}/version`);
      if(mtime&&mtime!==S.mtime){ S.mtime=mtime; await loadDoc();
        document.getElementById("status").textContent="↻ reloaded "+new Date().toLocaleTimeString(); }
    }catch(e){}
  },1500);
}
window.addEventListener("beforeunload",e=>{ if(S.dirty){e.preventDefault();e.returnValue="";} });

loadProjects();
</script>
</body>
</html>
